name: Nightly GSC Data Sync
on: { schedule: [ { cron: "0 0 * * *" } ], workflow_dispatch: {} }
jobs: { sync: { runs-on: ubuntu-latest, permissions: { contents: write }, steps: [ { uses: "actions/checkout@v3" }, { uses: "actions/setup-python@v4", with: { "python-version": "3.10" } }, { run: "pip install google-api-python-client google-auth-httplib2 google-auth-oauthlib gspread" }, { run: "python fetch_data.py", env: { GCP_SERVICE_ACCOUNT_JSON: "${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}" } } ] } }
