name: Nightly GSC Data Sync

on:
schedule:
- cron: '0 0 * * *'
  workflow_dispatch:

  jobs:
    sync_gsc_data:
        runs-on: ubuntu-latest
            permissions:
                  contents: write

                      steps:
                            - name: Checkout Repository
                                    uses: actions/checkout@v3

                                          - name: Set up Python
                                                  uses: actions/setup-python@v4
                                                          with:
                                                                    python-version: '3.10'

                                                                          - name: Install Dependencies
                                                                                  run: |
                                                                                            python -m pip install --upgrade pip
                                                                                                      pip install google-api-python-client google-auth-httplib2 google-auth-oauthlib gspread
                                                                                                      
                                                                                                            - name: Run GSC Fetch Script
                                                                                                                    env:
                                                                                                                              GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
                                                                                                                                      run: python fetch_data.py
                                                                                                                                      
                                                                                                                                            - name: Commit and Push Updates
                                                                                                                                                    run: |
                                                                                                                                                              git config --global user.name "github-actions[bot]"
                                                                                                                                                                        git config --global user.email "github-actions[bot]@users.noreply.github.com"
                                                                                                                                                                                  if git diff --exit-code courses.json > /dev/null; then
                                                                                                                                                                                              echo "No changes detected."
                                                                                                                                                                                                        else
                                                                                                                                                                                                                    git add courses.json
                                                                                                                                                                                                                                git commit -m "Automated GSC + Ads Sync [skip ci]"
                                                                                                                                                                                                                                            git push
                                                                                                                                                                                                                                                      fi
                                                                                                                                                                                                                                                      
