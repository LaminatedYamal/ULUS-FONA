<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYS/404 | Live Routing Switchboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Ambient Animated Background Blob (Synced with Main) -->
    <div class="ambient-blob"></div>

    <div class="switchboard-container">
        <div class="header">
            <div class="header-left">
                <button class="btn-home" onclick="location.href='../index.html'">← HOME</button>
                <div class="sys-tag">SYS/404</div>
            </div>
            <h1>LIVE ROUTING SWITCHBOARD</h1>
            <div class="status-indicator">
                <button class="sync-btn" onclick="fetchStatus()">SYNC NOW</button>
                <div id="global-led" class="led-dot green pulse"></div>
                <div id="global-status">SYSTEM NOMINAL</div>
            </div>
        </div>

        <div id="critical-alert" class="alert-panel" style="display: none;">
            ⚠️ CRITICAL: We should remove these URLs. (5+ Days Down)
            <div id="critical-list"></div>
        </div>

        <div class="filter-bar" style="display: flex; gap: 15px; margin-bottom: 20px; align-items: center; background: rgba(255,255,255,0.03); padding: 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05);">
            <div class="search-box" style="flex: 1; position: relative;">
                <input type="text" id="board-search" placeholder="Search course or institution..." oninput="applyFilters()" style="width: 100%; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); padding: 10px 15px; border-radius: 8px; color: white; font-family: 'Montserrat', sans-serif; outline: none;">
            </div>
            <div class="filter-buttons" style="display: flex; gap: 10px;">
                <select id="inst-filter" onchange="applyFilters()" style="background: #1a1a1c; border: 1px solid rgba(255,255,255,0.1); color: white; padding: 8px; border-radius: 6px; font-family: 'Montserrat', sans-serif; font-size: 11px; outline: none; cursor: pointer;">
                    <option value="all">ALL INSTITUTIONS</option>
                </select>
                <button onclick="setFilter('all')" class="filter-btn active" id="btn-all">ALL</button>
                <button onclick="setFilter('down')" class="filter-btn" id="btn-down">DOWN</button>
                <button onclick="setFilter('active')" class="filter-btn" id="btn-active">ACTIVE</button>
            </div>
        </div>

        <div class="server-status-bar" style="display: flex; justify-content: space-around; gap: 20px; margin-bottom: 20px; background: rgba(255,255,255,0.03); padding: 20px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); text-align: center;">
            <div class="server-item">
                <div id="led-lusofona" class="led-diode yellow pulse" style="margin: 0 auto 10px;"></div>
                <div style="font-size: 10px; font-weight: 800; letter-spacing: 1px; color: rgba(255,255,255,0.5);">LUSÓFONA</div>
            </div>
            <div class="server-item">
                <div id="led-ipluso" class="led-diode yellow pulse" style="margin: 0 auto 10px;"></div>
                <div style="font-size: 10px; font-weight: 800; letter-spacing: 1px; color: rgba(255,255,255,0.5);">IPLUSO</div>
            </div>
            <div class="server-item">
                <div id="led-ismat" class="led-diode yellow pulse" style="margin: 0 auto 10px;"></div>
                <div style="font-size: 10px; font-weight: 800; letter-spacing: 1px; color: rgba(255,255,255,0.5);">ISMAT</div>
            </div>
            <div class="server-item">
                <div id="led-islagaia" class="led-diode yellow pulse" style="margin: 0 auto 10px;"></div>
                <div style="font-size: 10px; font-weight: 800; letter-spacing: 1px; color: rgba(255,255,255,0.5);">ISLA GAIA</div>
            </div>
        </div>

        <div class="grid-header">
            <div class="col-led">STATUS</div>
            <div class="col-course">COURSE IDENTIFIER</div>
            <div class="col-inst">INSTITUTION</div>
            <div class="col-url">ENDPOINT</div>
            <div class="col-days">DAYS DOWN</div>
        </div>

        <div id="switch-board-rows" class="rows-container">
            <!-- Rows injected via JS -->
            <div class="loading-state">ESTABLISHING CONNECTION...</div>
        </div>
    </div>

    <script>
        const TRANSLATIONS = {
            'en': {
                'title': 'LIVE ROUTING SWITCHBOARD',
                'sync': 'SYNC NOW',
                'home': '← HOME',
                'all-inst': 'ALL INSTITUTIONS',
                'all': 'ALL',
                'down': 'DOWN',
                'active': 'ACTIVE',
                'status': 'STATUS',
                'course': 'COURSE IDENTIFIER',
                'inst': 'INSTITUTION',
                'endpoint': 'ENDPOINT',
                'days': 'DAYS DOWN',
                'loading': 'ESTABLISHING CONNECTION...',
                'search': 'Search course or institution...',
                'nominal': 'SYSTEM NOMINAL',
                'minor': 'MINOR ANOMALIES DETECTED',
                'critical': 'CRITICAL SECTOR FAILURES'
            },
            'pt': {
                'title': 'PAINEL DE ROTEAMENTO LIVE',
                'sync': 'SINC. AGORA',
                'home': '← INÍCIO',
                'all-inst': 'TODAS AS INSTITUIÇÕES',
                'all': 'TODOS',
                'down': 'DOWN',
                'active': 'ATIVOS',
                'status': 'STATUS',
                'course': 'IDENTIFICADOR DO CURSO',
                'inst': 'INSTITUIÇÃO',
                'endpoint': 'ENDPOINT',
                'days': 'DIAS DOWN',
                'loading': 'ESTABELECENDO CONEXÃO...',
                'search': 'Procurar curso ou instituição...',
                'nominal': 'SISTEMA NOMINAL',
                'minor': 'PEQUENAS ANOMALIAS DETETADAS',
                'critical': 'FALHAS CRÍTICAS DE SETOR'
            }
        };

        let currentLang = localStorage.getItem('hub_lang') || 'en';

        function updateUILanguage() {
            const t = TRANSLATIONS[currentLang];
            if (!t) return;
            document.querySelector('h1').textContent = t.title;
            const homeBtn = document.querySelector('.btn-home');
            if (homeBtn) homeBtn.textContent = t.home;
            const syncBtn = document.querySelector('.sync-btn');
            if (syncBtn) syncBtn.textContent = t.sync;
            
            const instFilter = document.getElementById('inst-filter');
            if (instFilter && instFilter.options[0]) {
                instFilter.options[0].textContent = t['all-inst'];
            }
            
            const btnAll = document.getElementById('btn-all');
            const btnDown = document.getElementById('btn-down');
            const btnActive = document.getElementById('btn-active');
            if (btnAll) btnAll.textContent = t.all;
            if (btnDown) btnDown.textContent = t.down;
            if (btnActive) btnActive.textContent = t.active;
            
            const search = document.getElementById('board-search');
            if (search) search.placeholder = t.search;
            
            const headers = document.querySelectorAll('.grid-header > div');
            if (headers.length >= 5) {
                headers[0].textContent = t.status;
                headers[1].textContent = t.course;
                headers[2].textContent = t.inst;
                headers[3].textContent = t.endpoint;
                headers[4].textContent = t.days;
            }
            
            const loading = document.querySelector('.loading-state');
            if (loading) loading.textContent = t.loading;
        }

        function loadScript(src) {
            return new Promise((resolve, reject) => {
                const s = document.createElement('script');
                s.src = src + '?v=' + Date.now();
                s.onload = resolve;
                s.onerror = reject;
                document.head.appendChild(s);
            });
        }

        async function initBoard() {
            try {
                console.log("[404 Board] Starting data ingestion...");
                
                // 1. Load Special Data (Toplinks)
                try {
                    await loadScript('results_special.js');
                    if (window.telemetryData) {
                        window.specialData = [...window.telemetryData];
                        console.log("[404 Board] Captured specialData:", window.specialData.length);
                        window.telemetryData = null; // Clear to avoid confusion
                    }
                } catch(e) { console.error("[404 Board] results_special.js failed"); }

                // 2. Load Main Data (Courses)
                try {
                    await loadScript('results.js');
                    console.log("[404 Board] Loaded main telemetryData:", window.telemetryData?.length);
                } catch(e) {
                    console.warn("[404 Board] results.js failed, trying fallback");
                    await loadScript('telemetry.js');
                }
                
                checkTelemetry();
            } catch (err) {
                console.error("Critical: All telemetry sources failed.");
                document.querySelector('.loading-state').textContent = "SYSTEM OFFLINE - CHECK REPO";
            }
        }

        initBoard();

        function checkTelemetry() {
            currentLang = localStorage.getItem('hub_lang') || 'en';
            updateUILanguage();
            
            if (window.telemetryData) {
                rawData = window.telemetryData.map(item => {
                    const txt = document.createElement('textarea');
                    txt.innerHTML = item.Institution || '';
                    return { ...item, Institution: txt.value };
                });

                if (window.specialData) {
                    updateServerLeds(window.specialData);
                }

                populateInstitutions(rawData);
                applyFilters();
                
                const loading = document.querySelector('.loading-state');
                if (loading) loading.style.display = 'none';
            }
        }
        
        function updateServerLeds(data) {
            console.log("[404 Board] Updating LEDs with data:", data);
            const mapping = {
                'led-lusofona': 'ensinolusofona.pt',
                'led-ipluso': 'ipluso.pt',
                'led-ismat': 'ismat.pt',
                'led-islagaia': 'islagaia.pt'
            };

            Object.keys(mapping).forEach(id => {
                const urlPart = mapping[id];
                const record = data.find(item => item.Url.toLowerCase().includes(urlPart));
                const led = document.getElementById(id);
                if (led && record) {
                    const isOk = record.Status === 'OK' || record.StatusCode === 200;
                    console.log(`[404 Board] LED ${id} status: ${isOk ? 'OK' : 'DOWN'}`);
                    led.className = `led-diode ${isOk ? 'green glow' : 'red pulse-fast'}`;
                } else {
                    console.warn(`[404 Board] No record found for ${id} (part: ${urlPart})`);
                }
            });
        }

        function populateInstitutions(data) {
            const select = document.getElementById('inst-filter');
            const currentValue = select.value;
            const institutions = [...new Set(data.map(item => item.Institution))].filter(i => i).sort();
            
            select.innerHTML = '<option value="all">ALL INSTITUTIONS</option>';
            institutions.forEach(inst => {
                const opt = document.createElement('option');
                opt.value = inst;
                opt.textContent = inst;
                opt.style.background = '#1a1a1c';
                opt.style.color = 'white';
                select.appendChild(opt);
            });
            select.value = currentValue || 'all';
        }

        function setFilter(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + filter).classList.add('active');
            applyFilters();
        }

        function applyFilters() {
            const search = document.getElementById('board-search').value.toLowerCase();
            const instFilter = document.getElementById('inst-filter').value;
            
            const filtered = rawData.filter(item => {
                const matchesSearch = item.Course.toLowerCase().includes(search) || item.Institution.toLowerCase().includes(search);
                const matchesStatus = (currentFilter === 'all') || 
                                     (currentFilter === 'down' && item.Status !== 'OK') ||
                                     (currentFilter === 'active' && item.Status === 'OK');
                const matchesInst = (instFilter === 'all') || (item.Institution === instFilter);
                
                return matchesSearch && matchesStatus && matchesInst;
            });

            // Sort: Errors first, then by ConsecutiveDaysDown descending
            filtered.sort((a, b) => {
                const aErr = a.Status !== 'OK';
                const bErr = b.Status !== 'OK';
                if (aErr && !bErr) return -1;
                if (!aErr && bErr) return 1;
                // If both are errors, sort by days down
                if (aErr && bErr) return (b.ConsecutiveDaysDown || 0) - (a.ConsecutiveDaysDown || 0);
                return 0;
            });

            renderBoard(filtered);
        }

        function renderBoard(data) {
            const container = document.getElementById('switch-board-rows');
            const criticalList = document.getElementById('critical-list');
            const criticalAlert = document.getElementById('critical-alert');
            const globalStatus = document.getElementById('global-status');
            const globalLed = document.getElementById('global-led');
            const t = TRANSLATIONS[currentLang];
            
            container.innerHTML = '';
            criticalList.innerHTML = '';
            let hasCritical = false;
            let totalErrors = 0;

            data.forEach(item => {
                const isError = item.Status !== 'OK';
                const daysDown = item.ConsecutiveDaysDown || 0;
                if (isError) totalErrors++;

                if (isError && daysDown >= 5) {
                    hasCritical = true;
                    const div = document.createElement('div');
                    div.textContent = `${item.Course} [${item.StatusCode}] - ${item.Url}`;
                    criticalList.appendChild(div);
                }

                const row = document.createElement('div');
                row.className = `row ${isError ? 'row-error' : 'row-ok'}`;
                row.innerHTML = `
                    <div class="col-led"><div class="led-diode ${isError ? 'red pulse-fast' : 'green glow'}"></div></div>
                    <div class="col-course">${item.Course}</div>
                    <div class="col-inst"><span class="inst-tag">${item.Institution}</span></div>
                    <div class="col-url"><a href="${item.Url}" target="_blank">${item.Url}</a></div>
                    <div class="col-days">${isError ? daysDown : '-'}</div>
                `;
                container.appendChild(row);
            });

            criticalAlert.style.display = hasCritical ? 'block' : 'none';
            if (hasCritical) {
                globalStatus.textContent = t.critical;
                globalLed.className = 'led-dot red pulse-fast';
            } else if (totalErrors > 0) {
                globalStatus.textContent = t.minor;
                globalLed.className = 'led-dot yellow pulse';
            } else {
                globalStatus.textContent = t.nominal;
                globalLed.className = 'led-dot green pulse';
            }
        }

        let currentFilter = 'all';
        let rawData = [];


        checkTelemetry();
        setInterval(() => location.reload(), 300000); // Hard refresh every 5 mins to catch new file
    </script>
</body>
</html>
