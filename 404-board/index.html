<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYS/404 | Live Routing Switchboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Ambient Animated Background Blob (Synced with Main) -->
    <div class="ambient-blob"></div>

    <div class="switchboard-container">
        <div class="header">
            <a href="../index.html" style="text-decoration: none; margin-right: 20px;">
                <div class="logo-box" style="background: rgba(255,255,255,0.05); color: var(--text-muted); cursor: pointer;">← BACK</div>
            </a>
            <div class="logo-box">SYS/404</div>
            <h1>LIVE ROUTING SWITCHBOARD</h1>
            <div class="status-indicator">
                <button onclick="fetchStatus()" style="background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #00ff87; padding: 5px 10px; border-radius: 4px; font-family: 'Share Tech Mono', monospace; font-size: 10px; cursor: pointer; margin-right: 15px;">SYNC NOW</button>
                <div class="led-dot green pulse" id="global-led"></div>
                <span id="global-status">SYSTEM NOMINAL</span>
            </div>
        </div>

        <div id="critical-alert" class="alert-panel" style="display: none;">
            ⚠️ CRITICAL: We should remove these URLs. (5+ Days Down)
            <div id="critical-list"></div>
        </div>

        <div class="filter-bar" style="display: flex; gap: 15px; margin-bottom: 20px; align-items: center; background: rgba(255,255,255,0.03); padding: 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05);">
            <div class="search-box" style="flex: 1; position: relative;">
                <input type="text" id="board-search" placeholder="Search course or institution..." oninput="applyFilters()" style="width: 100%; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); padding: 10px 15px; border-radius: 8px; color: white; font-family: 'Montserrat', sans-serif; outline: none;">
            </div>
            <div class="filter-buttons" style="display: flex; gap: 10px;">
                <button onclick="setFilter('all')" class="filter-btn active" id="btn-all">ALL</button>
                <button onclick="setFilter('down')" class="filter-btn" id="btn-down">DOWN</button>
                <button onclick="setFilter('active')" class="filter-btn" id="btn-active">ACTIVE</button>
            </div>
        </div>

        <div class="grid-header">
            <div class="col-led">STATUS</div>
            <div class="col-course">COURSE IDENTIFIER</div>
            <div class="col-url">ENDPOINT</div>
            <div class="col-days">DAYS DOWN</div>
        </div>

        <div id="switch-board-rows" class="rows-container">
            <!-- Rows injected via JS -->
            <div class="loading-state">ESTABLISHING CONNECTION...</div>
        </div>
    </div>

    <script>
        let currentFilter = 'all';
        let rawData = [];

        // Aggressive Cache Busting Loader
        (function() {
            const script = document.createElement('script');
            script.src = 'telemetry.js?v=' + Date.now();
            script.onload = () => {
                checkTelemetry();
            };
            document.head.appendChild(script);
        })();

        function checkTelemetry() {
            const savedTone = localStorage.getItem('hub_blob_tone');
            if (savedTone) document.documentElement.style.setProperty('--blob-gradient', savedTone);
            
            const savedBg = localStorage.getItem('hub_custom_bg');
            if (savedBg) {
                document.body.style.backgroundImage = `url(${savedBg})`;
                document.body.style.backgroundSize = 'cover';
                document.body.style.backgroundAttachment = 'fixed';
            }

            if (window.telemetryData) {
                rawData = window.telemetryData;
                applyFilters();
            } else {
                setTimeout(checkTelemetry, 1000);
            }
        }

        function setFilter(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + filter).classList.add('active');
            applyFilters();
        }

        function applyFilters() {
            const search = document.getElementById('board-search').value.toLowerCase();
            const filtered = rawData.filter(item => {
                const matchesSearch = item.Course.toLowerCase().includes(search) || item.Institution.toLowerCase().includes(search);
                const matchesFilter = (currentFilter === 'all') || 
                                     (currentFilter === 'down' && item.Status !== 'OK') ||
                                     (currentFilter === 'active' && item.Status === 'OK');
                return matchesSearch && matchesFilter;
            });
            renderBoard(filtered);
        }

        function renderBoard(data) {
            const container = document.getElementById('switch-board-rows');
            const criticalList = document.getElementById('critical-list');
            const criticalAlert = document.getElementById('critical-alert');
            const globalStatus = document.getElementById('global-status');
            const globalLed = document.getElementById('global-led');
            
            container.innerHTML = '';
            criticalList.innerHTML = '';
            let hasCritical = false;
            let totalErrors = 0;

            data.forEach(item => {
                const isError = item.Status !== 'OK';
                const daysDown = item.ConsecutiveDaysDown || 0;
                if (isError) totalErrors++;

                if (isError && daysDown >= 5) {
                    hasCritical = true;
                    const div = document.createElement('div');
                    div.textContent = `${item.Course} [${item.StatusCode}] - ${item.Url}`;
                    criticalList.appendChild(div);
                }

                const row = document.createElement('div');
                row.className = `row ${isError ? 'row-error' : 'row-ok'}`;
                row.innerHTML = `
                    <div class="col-led"><div class="led-diode ${isError ? 'red pulse-fast' : 'green glow'}"></div></div>
                    <div class="col-course">${item.Course} <span class="inst-tag">${item.Institution}</span></div>
                    <div class="col-url"><a href="${item.Url}" target="_blank">${item.Url}</a></div>
                    <div class="col-days">${isError ? daysDown : '-'}</div>
                `;
                container.appendChild(row);
            });

            criticalAlert.style.display = hasCritical ? 'block' : 'none';
            if (hasCritical) {
                globalStatus.textContent = 'CRITICAL SECTOR FAILURES';
                globalLed.className = 'led-dot red pulse-fast';
            } else if (totalErrors > 0) {
                globalStatus.textContent = 'MINOR ANOMALIES DETECTED';
                globalLed.className = 'led-dot yellow pulse';
            } else {
                globalStatus.textContent = 'SYSTEM NOMINAL';
                globalLed.className = 'led-dot green pulse';
            }
        }


        checkTelemetry();
        setInterval(() => location.reload(), 300000); // Hard refresh every 5 mins to catch new file
    </script>
</body>
</html>
